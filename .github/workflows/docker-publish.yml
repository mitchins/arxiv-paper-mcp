name: Publish Docker Image

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-ghcr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/arxiv-paper-mcp
          tags: |
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Annotate GitHub Release with image reference
        if: github.event_name == 'release'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.payload.release.tag_name;
            const owner = context.repo.owner.toLowerCase();
            const image = `ghcr.io/${owner}/arxiv-paper-mcp:${tag}`;
            const body = context.payload.release.body || '';
            const addition = [
              '',
              '## Docker',
              '```',
              `docker pull ${image}`,
              '```',
              `Also available as \`ghcr.io/${owner}/arxiv-paper-mcp:latest\``,
            ].join('\n');
            if (!body.includes('## Docker')) {
              await github.rest.repos.updateRelease({
                ...context.repo,
                release_id: context.payload.release.id,
                body: body + addition,
              });
            }
